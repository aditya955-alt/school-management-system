{% extends 'layout.html' %}
{% block content %}
<div class="card">
  <h2>Welcome Back</h2>
  <p>Sign in to access your college dashboard. Admin users can manage all data, while students can view their academic and fee status.</p>
  <form method="post">
    <div class="form-row">
      <div>
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
    </div>
    <input type="submit" value="Login">
  </form>
  <div style="margin-top: 20px; font-size: 0.95rem; color: #475569;">
    <strong>Sample credentials</strong><br>
    Admin: <code>admin</code> / <code>admin</code><br>
    Student: <code>john@student.com</code> / <code>password</code>
  </div>
</div>
{% endblock %}
